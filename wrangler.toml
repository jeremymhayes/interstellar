name = "interstellar-worker"
main = "worker.js"
compatibility_date = "2026-04-15"

[assets]
directory = "./static"
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
